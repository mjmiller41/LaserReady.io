# Conductor secret manifest — declares which secrets this project needs.
# Names/metadata ONLY; values live in the GNOME keyring
# (service=conductor, project=<dir-basename>, name=<name>), never in this file.
# Schema reference: ~/Conductor/.conductor/secrets.yaml
#
# Every access:agent entry must carry least_privilege:true (scoped cred) OR
# sensitive:false (attested harmless), or the broker refuses to inject it.
secrets: []
