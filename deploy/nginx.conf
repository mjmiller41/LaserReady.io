# LaserReady static site. TLS/domains are the shared Caddy proxy's job — this container
# only ever speaks plain HTTP on the internal Docker network.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml text/plain;
    gzip_min_length 1024;

    # Hashed build assets: cache forever.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # The shell must always revalidate so deploys land immediately.
    # `$uri.html` serves the prerendered blog (LAS-35) at clean, non-trailing-slash
    # URLs (/blog, /blog/<slug>) with no 301 redirect, so the served URL matches
    # each page's canonical tag. Everything else falls back to the SPA shell.
    location / {
        add_header Cache-Control "no-cache";
        add_header X-Content-Type-Options "nosniff";
        add_header Referrer-Policy "strict-origin-when-cross-origin";
        try_files $uri $uri.html $uri/ /index.html;
    }
}
