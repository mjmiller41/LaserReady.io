<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Drop in any SVG or DXF and find out what will go wrong on the laser before you waste material. Free file checker — your file never leaves the browser."
    />
    <title>LaserReady — will that file actually cut?</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <meta name="color-scheme" content="light dark" />
    <!-- Apply the theme before first paint to avoid a light/dark flash. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('lr-theme');
          var dark = stored ? stored === 'dark' : matchMedia('(prefers-color-scheme: dark)').matches;
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
    <!-- Umami analytics (cookieless, no PII; never sees the user's file). -->
    <script defer src="https://analytics.mjmiller.cloud/script.js" data-website-id="439eac8a-0f8b-4680-bed5-a897b500f88d"></script>
    <script type="module" src="/src/main.tsx"></script>
  </head>
  <body>
    <div id="app"></div>
  </body>
</html>
