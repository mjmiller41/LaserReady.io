<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="100mm" height="60mm" viewBox="0 0 100 60">
  <!-- 0.4 mm web between cuts: below burn_through (0.5) -->
  <line x1="10" y1="20" x2="60" y2="20" stroke="#000000" stroke-width="0.1"/>
  <line x1="10" y1="20.4" x2="60" y2="20.4" stroke="#000000" stroke-width="0.1"/>
  <!-- 0.8 mm web: below min_feature (1.0 @ 3 mm) but above burn_through -->
  <line x1="10" y1="40" x2="60" y2="40" stroke="#000000" stroke-width="0.1"/>
  <line x1="10" y1="40.8" x2="60" y2="40.8" stroke="#000000" stroke-width="0.1"/>
</svg>
